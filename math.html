<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Math Practice | Abhinav's STEM Tools</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        :root {
            --bg: #020617;
            --panel: #020617;
            --card: #020617;
            --accent: #38bdf8;
            --accent-2: #6366f1;
            --accent-soft: rgba(56, 189, 248, 0.16);
            --text: #e5e7eb;
            --muted: #9ca3af;
            --border: #1f2937;
            --radius: 16px;
            --shadow-soft: 0 24px 60px rgba(0, 0, 0, 0.75);
            --danger: #f97373;
            --success: #4ade80;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
            background: radial-gradient(circle at top, #0b1120 0, #020617 45%, #000 100%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* NAVBAR */
        .navbar {
            padding: 14px 22px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(148, 163, 184, 0.25);
            backdrop-filter: blur(18px);
            background: linear-gradient(to right, rgba(15,23,42,0.9), rgba(15,23,42,0.7));
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .navbar-title {
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 0.03em;
        }

        .navbar-subtitle {
            font-size: 12px;
            color: var(--muted);
        }

        .navbar-left {
            display: flex;
            flex-direction: column;
        }

        .btn-nav {
            padding: 8px 14px;
            border-radius: 999px;
            background: rgba(15,23,42,0.9);
            border: 1px solid var(--border);
            color: var(--muted);
            text-decoration: none;
            font-size: 13px;
        }

        /* MAIN LAYOUT */
        .page {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: stretch;
            padding: 18px 12px 24px;
        }

        .app-shell {
            width: 100%;
            max-width: 1200px;
            display: grid;
            grid-template-columns: minmax(0, 1.1fr) minmax(0, 1.2fr);
            gap: 20px;
        }

        @media (max-width: 900px) {
            .app-shell {
                grid-template-columns: 1fr;
            }
        }

        /* LEFT: CONTROL PANEL */
        .panel {
            background: radial-gradient(circle at top left, rgba(56,189,248,0.08), transparent 55%),
                        radial-gradient(circle at bottom right, rgba(99,102,241,0.12), transparent 55%),
                        #020617;
            border-radius: 24px;
            border: 1px solid rgba(148, 163, 184, 0.35);
            padding: 18px 18px 20px;
            box-shadow: var(--shadow-soft);
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .badge {
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 999px;
            border: 1px solid rgba(148, 163, 184, 0.5);
            color: var(--muted);
        }

        .tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 4px;
        }

        .tab {
            padding: 7px 12px;
            border-radius: 999px;
            border: 1px solid rgba(148, 163, 184, 0.5);
            background: rgba(15,23,42,0.9);
            color: var(--muted);
            font-size: 12px;
            cursor: pointer;
            transition: 0.15s;
        }

        .tab.active {
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            border-color: transparent;
            color: white;
            box-shadow: 0 12px 30px rgba(56, 189, 248, 0.45);
        }

        .stats-row {
            display: flex;
            gap: 12px;
            margin-top: 6px;
            font-size: 12px;
            color: var(--muted);
        }

        .stat-pill {
            padding: 6px 10px;
            border-radius: 999px;
            border: 1px solid rgba(148, 163, 184, 0.4);
            background: rgba(15,23,42,0.8);
        }

        .progress-wrap {
            margin-top: 8px;
        }

        .progress-label {
            font-size: 11px;
            color: var(--muted);
            margin-bottom: 4px;
        }

        .progress-bar {
            height: 8px;
            background: rgba(15,23,42,0.9);
            border-radius: 999px;
            overflow: hidden;
            border: 1px solid rgba(148, 163, 184, 0.5);
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            transition: width 0.3s ease;
        }

        .controls {
            margin-top: 10px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn-primary {
            padding: 9px 16px;
            border-radius: 999px;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            color: white;
            border: none;
            cursor: pointer;
            font-size: 13px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 14px 35px rgba(56, 189, 248, 0.45);
        }

        .btn-ghost {
            padding: 9px 16px;
            border-radius: 999px;
            background: rgba(15,23,42,0.9);
            border: 1px solid rgba(148, 163, 184, 0.5);
            color: var(--muted);
            cursor: pointer;
            font-size: 13px;
        }

        .btn-primary:disabled,
        .btn-ghost:disabled {
            opacity: 0.5;
            cursor: default;
            box-shadow: none;
        }

        /* RIGHT: PROBLEM WORKSPACE */
        .workspace {
            background: radial-gradient(circle at top right, rgba(56,189,248,0.12), transparent 55%),
                        radial-gradient(circle at bottom left, rgba(99,102,241,0.16), transparent 55%),
                        #020617;
            border-radius: 24px;
            border: 1px solid rgba(148, 163, 184, 0.35);
            padding: 20px 20px 22px;
            box-shadow: var(--shadow-soft);
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .problem-label {
            font-size: 12px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.12em;
        }

        .problem-text {
            margin-top: 4px;
            font-size: 16px;
            line-height: 1.5;
        }

        .answer-input-row {
            margin-top: 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
        }

        .answer-input {
            flex: 1;
            min-width: 140px;
            padding: 8px 10px;
            border-radius: 10px;
            border: 1px solid rgba(148, 163, 184, 0.6);
            background: rgba(15,23,42,0.9);
            color: var(--text);
            font-size: 14px;
        }

        .answer-input::placeholder {
            color: rgba(148, 163, 184, 0.7);
        }

        .feedback {
            margin-top: 6px;
            font-size: 13px;
            min-height: 18px;
        }

        .feedback.correct {
            color: var(--success);
        }

        .feedback.incorrect {
            color: var(--danger);
        }

        .answer-block, .explanation-block {
            margin-top: 12px;
            padding: 12px;
            background: rgba(15,23,42,0.9);
            border-radius: 14px;
            border: 1px solid rgba(148, 163, 184, 0.5);
            font-size: 14px;
            line-height: 1.5;
            display: none;
        }

        .answer-block strong,
        .explanation-block strong {
            font-size: 13px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.12em;
        }

        .choices {
            margin-top: 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .choice-btn {
            padding: 7px 12px;
            border-radius: 999px;
            border: 1px solid rgba(148, 163, 184, 0.5);
            background: rgba(15,23,42,0.9);
            color: var(--muted);
            font-size: 13px;
            cursor: pointer;
        }

        .choice-btn.correct-choice {
            border-color: var(--success);
        }

        .choice-btn.wrong-choice {
            border-color: var(--danger);
        }
    </style>
</head>

<body>

<div class="navbar">
    <div class="navbar-left">
        <div class="navbar-title">✏️ Math Practice</div>
        <div class="navbar-subtitle">Hard, adaptive problems — Algebra through Calculus</div>
    </div>
    <a href="index.html" class="btn-nav">← Back to Home</a>
</div>

<div class="page">
    <div class="app-shell">

        <!-- LEFT: CONTROL PANEL -->
        <div class="panel">
            <div class="panel-header">
                <div>
                    <div class="badge">Adaptive difficulty</div>
                </div>
            </div>

            <div class="tabs">
                <div class="tab active" data-topic="algebra">Algebra</div>
                <div class="tab" data-topic="geometry">Geometry</div>
                <div class="tab" data-topic="algebra2">Algebra 2</div>
                <div class="tab" data-topic="precalculus">Precalculus</div>
                <div class="tab" data-topic="calculus">Calculus</div>
                <div class="tab" data-topic="mixed">Mixed</div>
            </div>

            <div class="stats-row">
                <div class="stat-pill">Streak: <span id="streak">0</span></div>
                <div class="stat-pill">Difficulty: <span id="difficultyLabel">Medium</span></div>
            </div>

            <div class="progress-wrap">
                <div class="progress-label">Difficulty progression</div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
            </div>

            <div class="controls">
                <button class="btn-primary" id="nextProblemBtn">Next Problem</button>
                <button class="btn-ghost" id="showSolutionBtn" disabled>Show Full Solution</button>
            </div>
        </div>

        <!-- RIGHT: WORKSPACE -->
        <div class="workspace">
            <div class="problem-label">Problem</div>
            <div class="problem-text" id="problemText">
                Choose a topic and click “Next Problem” to begin.
            </div>

            <div class="choices" id="choicesContainer" style="display:none;"></div>

            <div class="answer-input-row">
                <input id="answerInput" class="answer-input" placeholder="Type your answer here (or click a choice)">
                <button class="btn-ghost" id="checkAnswerBtn" disabled>Check Answer</button>
            </div>

            <div class="feedback" id="feedback"></div>

            <div class="answer-block" id="answerBlock">
                <strong>Correct answer</strong>
                <div id="answerText"></div>
            </div>

            <div class="explanation-block" id="explanationBlock">
                <strong>Explanation</strong>
                <div id="explanationText"></div>
            </div>
        </div>

    </div>
</div>

<script>
/* ============================================================
   STATE + ADAPTIVE DIFFICULTY
============================================================ */
let currentTopic = "algebra";
let streak = 0;
let difficulty = 2; // 1 easy, 2 medium, 3 hard, 4 very hard
let currentProblem = null;

const streakEl = document.getElementById("streak");
const difficultyLabelEl = document.getElementById("difficultyLabel");
const progressFillEl = document.getElementById("progressFill");
const problemTextEl = document.getElementById("problemText");
const answerInputEl = document.getElementById("answerInput");
const feedbackEl = document.getElementById("feedback");
const answerBlockEl = document.getElementById("answerBlock");
const explanationBlockEl = document.getElementById("explanationBlock");
const answerTextEl = document.getElementById("answerText");
const explanationTextEl = document.getElementById("explanationText");
const choicesContainerEl = document.getElementById("choicesContainer");
const nextProblemBtn = document.getElementById("nextProblemBtn");
const showSolutionBtn = document.getElementById("showSolutionBtn");
const checkAnswerBtn = document.getElementById("checkAnswerBtn");

function updateDifficulty() {
    if (streak >= 10) difficulty = 4;
    else if (streak >= 6) difficulty = 3;
    else if (streak >= 3) difficulty = 2;
    else difficulty = 1;

    const labels = {1: "Warm-up", 2: "Medium", 3: "Hard", 4: "Very hard"};
    difficultyLabelEl.textContent = labels[difficulty];
    progressFillEl.style.width = (difficulty * 25) + "%";
}

/* ============================================================
   UTILITIES
============================================================ */
function randInt(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
}
function choose(arr) {
    return arr[Math.floor(Math.random() * arr.length)];
}
function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
}

/* Smart answer normalization */
function normalizeAnswer(str) {
    return String(str)
        .trim()
        .toLowerCase()
        .replace(/\s+/g, "")
        .replace(/≈/g, "")
        .replace(/·/g, "*");
}

/* Numeric closeness check */
function numericClose(user, correct, tol = 1e-3) {
    const u = parseFloat(user);
    const c = parseFloat(correct);
    if (isNaN(u) || isNaN(c)) return false;
    return Math.abs(u - c) <= tol;
}

/* ============================================================
   PROBLEM GENERATORS (HARD)
============================================================ */

/* ---------- ALGEBRA ---------- */
function generateAlgebra() {
    if (difficulty === 1) {
        const x = randInt(-5, 8);
        const a = randInt(2, 5);
        const b = randInt(3, 9);
        const c = randInt(-10, 10);
        const rhs = a * (x + b) - c;

        return {
            problem: `Solve for x: ${a}(x + ${b}) - ${c} = ${rhs}`,
            answer: `${x}`,
            explanation:
                `1. Distribute: ${a}(x + ${b}) = ${a}x + ${a*b}.<br>
                 2. Equation becomes ${a}x + ${a*b} - ${c} = ${rhs}.<br>
                 3. Combine constants: ${a}x + ${a*b - c} = ${rhs}.<br>
                 4. Subtract ${a*b - c}: ${a}x = ${rhs - (a*b - c)}.<br>
                 5. Divide by ${a}: x = ${x}.`,
            choices: null
        };
    }

    if (difficulty === 2) {
        const x = randInt(-4, 6);
        const y = randInt(-4, 6);
        const a1 = randInt(1, 5), b1 = randInt(1, 5);
        const a2 = randInt(1, 5), b2 = randInt(1, 5);
        const c1 = a1*x + b1*y;
        const c2 = a2*x + b2*y;

        return {
            problem: `Solve the system:<br>
                      ${a1}x + ${b1}y = ${c1}<br>
                      ${a2}x + ${b2}y = ${c2}`,
            answer: `(${x},${y})`,
            explanation:
                `Use elimination:<br>
                 1. Multiply equations to align coefficients.<br>
                 2. Subtract to eliminate a variable.<br>
                 3. Solve for the remaining variable.<br>
                 4. Substitute back to find the other.<br>
                 5. Check: (${x}, ${y}) satisfies both equations.`,
            choices: null
        };
    }

    // difficulty >= 3: rational equation
    const x = randInt(1, 6);
    const a = randInt(2, 5);
    const b = randInt(2, 5);
    const lhs = (a*x + b) / x;

    const correct = `${x}`;
    const distractors = shuffle([
        `${x+1}`,
        `${x-1}`,
        `${a}`,
        `${b}`
    ]).slice(0, 3);

    return {
        problem: `Solve the rational equation: ( ${a}x + ${b} ) / x = ${lhs}`,
        answer: correct,
        explanation:
            `1. Multiply both sides by x to clear the denominator: ${a}x + ${b} = ${lhs}x.<br>
             2. Rearrange: ${a}x - ${lhs}x = -${b}.<br>
             3. Factor x: x(${a - lhs}) = -${b}.<br>
             4. Solve for x: x = ${x}.`,
        choices: shuffle([correct, ...distractors])
    };
}

/* ---------- GEOMETRY ---------- */
function generateGeometry() {
    if (difficulty === 1) {
        const a1 = choose([40, 50, 60]);
        const a2 = choose([30, 40, 50]);
        const a3 = 180 - a1 - a2;

        return {
            problem: `A triangle has angles ${a1}° and ${a2}°. Find the third angle.`,
            answer: `${a3}`,
            explanation:
                `Angles in a triangle sum to 180°.<br>
                 ${a1} + ${a2} + x = 180 → x = ${a3}.`,
            choices: null
        };
    }

    if (difficulty === 2) {
        const scale = randInt(2, 4);
        const s1 = randInt(3, 8);
        const s2 = s1 * scale;

        return {
            problem: `Two triangles are similar. In the smaller triangle, a side is ${s1}. The corresponding side in the larger triangle is ${s2}. What is the scale factor (large/small)?`,
            answer: `${scale}`,
            explanation:
                `Scale factor = large / small = ${s2} / ${s1} = ${scale}.`,
            choices: shuffle([`${scale}`, `${scale-1}`, `${scale+1}`, `${scale+2}`])
        };
    }

    const r = randInt(3, 8);
    const h = randInt(4, 12);
    const vol = (3.14 * r*r * h).toFixed(2);

    return {
        problem: `A right circular cylinder has radius ${r} and height ${h}. Use π ≈ 3.14 to find its volume.`,
        answer: `${vol}`,
        explanation:
            `Volume of a cylinder: V = πr²h.<br>
             V ≈ 3.14 × ${r}² × ${h} = 3.14 × ${r*r} × ${h} ≈ ${vol}.`,
        choices: null
    };
}

/* ---------- ALGEBRA 2 ---------- */
function generateAlgebra2() {
    if (difficulty === 1) {
        const r1 = randInt(-5, 5);
        const r2 = randInt(-5, 5);
        const b = -(r1 + r2);
        const c = r1 * r2;

        return {
            problem: `Solve: x² ${b>=0?"+ "+b:"- "+Math.abs(b)}x ${c>=0?"+ "+c:"- "+Math.abs(c)} = 0`,
            answer: `${r1},${r2}`,
            explanation:
                `Factor: (x - ${r1})(x - ${r2}) = 0 → x = ${r1} or x = ${r2}.`,
            choices: null
        };
    }

    if (difficulty === 2) {
        const c = randInt(1, 9);
        return {
            problem: `Solve over ℂ: x² + ${c} = 0`,
            answer: `±${Math.sqrt(c)}i`,
            explanation:
                `x² = -${c} → x = ±√(-${c}) = ±√${c}·i.`,
            choices: null
        };
    }

    const base = choose([2,3,5,10]);
    const k = randInt(2,5);
    const correct = `${Math.pow(base,k)}`;
    const distractors = shuffle([
        `${Math.pow(base,k-1)}`,
        `${Math.pow(base,k+1)}`,
        `${k}`
    ]).slice(0,3);

    return {
        problem: `Solve for x: log_${base}(x) = ${k}`,
        answer: correct,
        explanation:
            `By definition, log_b(x) = k ⇔ b^k = x.<br>
             Here, x = ${base}^${k} = ${correct}.`,
        choices: shuffle([correct, ...distractors])
    };
}

/* ---------- PRECALCULUS ---------- */
function generatePrecalculus() {
    if (difficulty === 1) {
        const angle = choose([30,45,60]);
        return {
            problem: `Simplify: sin²(${angle}°) + cos²(${angle}°)`,
            answer: `1`,
            explanation: `Pythagorean identity: sin²θ + cos²θ = 1.`,
            choices: shuffle(["0","1","2","cos(2θ)"])
        };
    }

    if (difficulty === 2) {
        const base = choose([2,3,5]);
        const k = randInt(2,5);
        return {
            problem: `Solve: ${base}^x = ${Math.pow(base,k)}`,
            answer: `${k}`,
            explanation:
                `Match exponents: ${base}^x = ${base}^${k} ⇒ x = ${k}.`,
            choices: shuffle([`${k}`, `${k-1}`, `${k+1}`, `${k+2}`])
        };
    }

    const a1 = randInt(-5,10);
    const d = randInt(-4,6);
    const n = randInt(5,12);
    const an = a1 + (n-1)*d;

    return {
        problem: `In an arithmetic sequence, a₁ = ${a1} and d = ${d}. Find aₙ for n = ${n}.`,
        answer: `${an}`,
        explanation:
            `Formula: aₙ = a₁ + (n-1)d = ${a1} + (${n-1})(${d}) = ${an}.`,
        choices: null
    };
}

/* ---------- CALCULUS ---------- */
function generateCalculus() {
    if (difficulty === 1) {
        const a = randInt(1,5);
        const n = randInt(2,5);
        return {
            problem: `Find d/dx [ ${a}x^${n} ]`,
            answer: `${a*n}x^${n-1}`,
            explanation: `Power rule: d/dx[x^n] = nx^(n-1).`,
            choices: null
        };
    }

    if (difficulty === 2) {
        const a = randInt(1,5);
        const b = randInt(1,5);
        return {
            problem: `Let f(x) = x²(${a}x + ${b}). Compute f'(x).`,
            answer: `${2*a}x² + ${2*b}x + ${a}x²`,
            explanation:
                `Product rule: (fg)' = f'g + fg'.<br>
                 f = x², g = ${a}x + ${b}.`,
            choices: null
        };
    }

    const a = randInt(2,5);
    const n = randInt(2,4);
    return {
        problem: `Find d/dx [ (${a}x + 1)^${n} ]`,
        answer: `${a*n}(${a}x + 1)^{${n-1}}`,
        explanation:
            `Chain rule: derivative of u^n is n·u^(n-1)·u'.<br>
             u = ${a}x + 1 → u' = ${a}.`,
        choices: null
    };
}

/* ============================================================
   MASTER GENERATOR
============================================================ */
function generateProblem(topic) {
    if (topic === "mixed") {
        topic = choose(["algebra","geometry","algebra2","precalculus","calculus"]);
    }

    if (topic === "algebra") return generateAlgebra();
    if (topic === "geometry") return generateGeometry();
    if (topic === "algebra2") return generateAlgebra2();
    if (topic === "precalculus") return generatePrecalculus();
    if (topic === "calculus") return generateCalculus();
}

/* ============================================================
   UI WIRING
============================================================ */
const tabs = document.querySelectorAll(".tab");

tabs.forEach(tab => {
    tab.addEventListener("click", () => {
        tabs.forEach(t => t.classList.remove("active"));
        tab.classList.add("active");
        currentTopic = tab.dataset.topic;
        streak = 0;
        updateDifficulty();
        streakEl.textContent = streak;
        problemTextEl.innerHTML = "Click Next Problem to begin.";
        answerBlockEl.style.display = "none";
        explanationBlockEl.style.display = "none";
        feedbackEl.textContent = "";
        feedbackEl.className = "feedback";
        answerInputEl.value = "";
        choicesContainerEl.style.display = "none";
        showSolutionBtn.disabled = true;
        checkAnswerBtn.disabled = true;
    });
});

nextProblemBtn.addEventListener("click", () => {
    currentProblem = generateProblem(currentTopic);
    problemTextEl.innerHTML = currentProblem.problem;
    answerBlockEl.style.display = "none";
    explanationBlockEl.style.display = "none";
    feedbackEl.textContent = "";
    feedbackEl.className = "feedback";
    answerInputEl.value = "";
    showSolutionBtn.disabled = false;
    checkAnswerBtn.disabled = false;

    // multiple choice
    choicesContainerEl.innerHTML = "";
    if (currentProblem.choices && currentProblem.choices.length) {
        choicesContainerEl.style.display = "flex";
        currentProblem.choices.forEach(choice => {
            const btn = document.createElement("button");
            btn.className = "choice-btn";
            btn.textContent = choice;
            btn.addEventListener("click", () => {
                answerInputEl.value = choice;
            });
            choicesContainerEl.appendChild(btn);
        });
    } else {
        choicesContainerEl.style.display = "none";
    }
});

checkAnswerBtn.addEventListener("click", () => {
    if (!currentProblem) return;
    const userRaw = answerInputEl.value;
    if (!userRaw.trim()) return;

    const userNorm = normalizeAnswer(userRaw);
    const correctNorm = normalizeAnswer(currentProblem.answer);

    let correct = false;

    if (numericClose(userRaw, currentProblem.answer)) {
        correct = true;
    } else if (userNorm === correctNorm) {
        correct = true;
    }

    if (correct) {
        feedbackEl.textContent = "Correct!";
        feedbackEl.className = "feedback correct";
        streak++;
        streakEl.textContent = streak;
        updateDifficulty();
    } else {
        feedbackEl.textContent = "Not quite — try again or show the full solution.";
        feedbackEl.className = "feedback incorrect";
        streak = Math.max(0, streak - 1);
        streakEl.textContent = streak;
        updateDifficulty();
    }
});

showSolutionBtn.addEventListener("click", () => {
    if (!currentProblem) return;
    answerBlockEl.style.display = "block";
    explanationBlockEl.style.display = "block";
    answerTextEl.textContent = currentProblem.answer;
    explanationTextEl.innerHTML = currentProblem.explanation;
});
</script>

</body>
</html>
