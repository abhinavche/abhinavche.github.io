<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Math Practice | Abhinav's STEM Tools</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        :root {
            --bg: #f5f7fa;
            --panel: #ffffff;
            --card: #ffffff;
            --accent: #2563eb;
            --accent-2: #7c3aed;
            --accent-soft: rgba(37, 99, 235, 0.12);
            --text: #1e293b;
            --muted: #64748b;
            --border: #cbd5e1;
            --radius: 16px;
            --shadow-soft: 0 18px 45px rgba(0, 0, 0, 0.08);
        }

        body.dark {
            --bg: #020617;
            --panel: #0f172a;
            --card: #0f172a;
            --accent: #38bdf8;
            --accent-2: #6366f1;
            --accent-soft: rgba(56, 189, 248, 0.16);
            --text: #e5e7eb;
            --muted: #9ca3af;
            --border: #1f2937;
            --shadow-soft: 0 18px 45px rgba(0, 0, 0, 0.75);
        }

        body {
            margin: 0;
            font-family: system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        /* NAVBAR */
        .navbar {
            background: var(--panel);
            border-bottom: 1px solid var(--border);
            padding: 14px 22px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow-soft);
        }

        .navbar-title {
            font-size: 20px;
            font-weight: 600;
        }

        .btn-nav {
            padding: 8px 14px;
            border-radius: 999px;
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--muted);
            text-decoration: none;
            font-size: 13px;
        }

        /* PAGE LAYOUT */
        .page {
            max-width: 1100px;
            margin: 0 auto;
            padding: 28px 16px;
            display: grid;
            grid-template-columns: 260px 1fr;
            gap: 24px;
        }

        @media (max-width: 900px) {
            .page {
                grid-template-columns: 1fr;
            }
        }

        /* SIDEBAR */
        .sidebar {
            background: var(--panel);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            padding: 20px;
            box-shadow: var(--shadow-soft);
        }

        .tabs {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .tab {
            padding: 10px 14px;
            border-radius: 10px;
            background: var(--card);
            border: 1px solid var(--border);
            cursor: pointer;
            font-size: 14px;
            transition: 0.15s;
        }

        .tab.active {
            background: var(--accent-soft);
            border-color: var(--accent);
            color: var(--accent);
            font-weight: 600;
        }

        .stats {
            margin-top: 20px;
            font-size: 14px;
            color: var(--muted);
        }

        .progress-bar {
            margin-top: 6px;
            height: 10px;
            background: var(--border);
            border-radius: 999px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            transition: width 0.3s ease;
        }

        /* RIGHT SIDE */
        .main-card {
            background: var(--panel);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            padding: 24px;
            box-shadow: var(--shadow-soft);
        }

        .problem-text {
            font-size: 17px;
            margin-bottom: 16px;
        }

        .btn-primary {
            padding: 10px 18px;
            border-radius: 999px;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            color: white;
            border: none;
            cursor: pointer;
            font-size: 14px;
            margin-right: 10px;
        }

        .btn-ghost {
            padding: 10px 18px;
            border-radius: 999px;
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--muted);
            cursor: pointer;
            font-size: 14px;
        }

        .answer-block, .explanation-block {
            margin-top: 20px;
            padding: 16px;
            background: var(--card);
            border-radius: 12px;
            border: 1px solid var(--border);
            display: none;
        }

        .explanation-block {
            font-size: 14px;
            line-height: 1.5;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="navbar-title">✏️ Math Practice</div>
    <a href="index.html" class="btn-nav">← Back to Home</a>
</div>

<!-- PAGE -->
<div class="page">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <div class="tabs">
            <div class="tab active" data-topic="algebra">Algebra</div>
            <div class="tab" data-topic="geometry">Geometry</div>
            <div class="tab" data-topic="algebra2">Algebra 2</div>
            <div class="tab" data-topic="precalculus">Precalculus</div>
            <div class="tab" data-topic="calculus">Calculus</div>
            <div class="tab" data-topic="mixed">Mixed</div>
        </div>

        <div class="stats">
            <div>Streak: <span id="streak">0</span></div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main-card">
        <div class="problem-text" id="problemText">
            Choose a topic to begin.
        </div>

        <button class="btn-primary" id="nextProblemBtn">Next Problem</button>
        <button class="btn-ghost" id="showAnswerBtn" disabled>Show Answer</button>

        <div class="answer-block" id="answerBlock">
            <strong>Answer:</strong>
            <div id="answerText"></div>
        </div>

        <div class="explanation-block" id="explanationBlock">
            <strong>Explanation:</strong>
            <div id="explanationText"></div>
        </div>
    </div>

</div>
<script>
/* ============================================================
   STATE + ADAPTIVE DIFFICULTY
============================================================ */
let currentTopic = "algebra";
let streak = 0;
let difficulty = 2; // 1 = easy, 2 = medium, 3 = hard, 4 = very hard

function updateDifficulty() {
    if (streak >= 8) difficulty = 4;
    else if (streak >= 5) difficulty = 3;
    else if (streak >= 2) difficulty = 2;
    else difficulty = 1;

    document.getElementById("progressFill").style.width = (difficulty * 25) + "%";
}

/* ============================================================
   UTILITIES
============================================================ */
function randInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
function choose(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

/* ============================================================
   PROBLEM GENERATORS (HARDER)
============================================================ */

/* ---------- ALGEBRA ---------- */
function generateAlgebra() {
    if (difficulty === 1) {
        const x = randInt(-5, 8);
        const a = randInt(2, 5);
        const b = randInt(3, 9);
        const c = randInt(-10, 10);
        const rhs = a * (x + b) - c;

        return {
            problem: `Solve: ${a}(x + ${b}) - ${c} = ${rhs}`,
            answer: `x = ${x}`,
            explanation:
                `1. Distribute: ${a}(x + ${b}) = ${a}x + ${a*b}.<br>
                 2. Equation becomes ${a}x + ${a*b} - ${c} = ${rhs}.<br>
                 3. Combine constants: ${a}x + ${a*b - c} = ${rhs}.<br>
                 4. Subtract ${a*b - c}: ${a}x = ${rhs - (a*b - c)}.<br>
                 5. Divide by ${a}: x = ${x}.`
        };
    }

    if (difficulty === 2) {
        const x = randInt(-4, 6);
        const y = randInt(-4, 6);
        const a1 = randInt(1, 5), b1 = randInt(1, 5);
        const a2 = randInt(1, 5), b2 = randInt(1, 5);
        const c1 = a1*x + b1*y;
        const c2 = a2*x + b2*y;

        return {
            problem: `Solve the system:<br>
                      ${a1}x + ${b1}y = ${c1}<br>
                      ${a2}x + ${b2}y = ${c2}`,
            answer: `(x, y) = (${x}, ${y})`,
            explanation:
                `Use elimination:<br>
                 1. Multiply equations to align coefficients.<br>
                 2. Subtract to eliminate a variable.<br>
                 3. Solve for the remaining variable.<br>
                 4. Substitute back to find the other.<br>
                 5. Check: plugging in (${x}, ${y}) satisfies both equations.`
        };
    }

    if (difficulty >= 3) {
        const x = randInt(1, 6);
        const a = randInt(2, 5);
        const b = randInt(2, 5);
        const lhs = (a*x + b) / x;

        return {
            problem: `Solve the rational equation: ( ${a}x + ${b} ) / x = ${lhs}`,
            answer: `x = ${x}`,
            explanation:
                `1. Multiply both sides by x to clear the denominator.<br>
                 2. You get ${a}x + ${b} = ${lhs}x.<br>
                 3. Rearrange: ${a}x - ${lhs}x = -${b}.<br>
                 4. Factor x: x(${a - lhs}) = -${b}.<br>
                 5. Solve for x: x = ${x}.`
        };
    }
}

/* ---------- GEOMETRY ---------- */
function generateGeometry() {
    if (difficulty === 1) {
        const a1 = choose([40, 50, 60]);
        const a2 = choose([30, 40, 50]);
        const a3 = 180 - a1 - a2;

        return {
            problem: `Triangle has angles ${a1}° and ${a2}°. Find the third angle.`,
            answer: `${a3}°`,
            explanation:
                `Angles sum to 180°.<br>
                 ${a1} + ${a2} + x = 180 → x = ${a3}.`
        };
    }

    if (difficulty === 2) {
        const scale = randInt(2, 4);
        const s1 = randInt(3, 8);
        const s2 = s1 * scale;

        return {
            problem: `Two similar triangles: small side = ${s1}, large corresponding side = ${s2}. Find the scale factor.`,
            answer: `${scale}`,
            explanation:
                `Scale factor = large / small = ${s2} / ${s1} = ${scale}.`
        };
    }

    if (difficulty >= 3) {
        const r = randInt(3, 8);
        const h = randInt(4, 12);
        const vol = (3.14 * r*r * h).toFixed(2);

        return {
            problem: `Cylinder radius ${r}, height ${h}. Compute volume (π ≈ 3.14).`,
            answer: `${vol}`,
            explanation:
                `V = πr²h = 3.14 × ${r*r} × ${h} = ${vol}.`
        };
    }
}

/* ---------- ALGEBRA 2 ---------- */
function generateAlgebra2() {
    if (difficulty === 1) {
        const r1 = randInt(-5, 5);
        const r2 = randInt(-5, 5);
        const b = -(r1 + r2);
        const c = r1 * r2;

        return {
            problem: `Solve: x² ${b>=0?"+ "+b:"- "+Math.abs(b)}x ${c>=0?"+ "+c:"- "+Math.abs(c)} = 0`,
            answer: `x = ${r1}, ${r2}`,
            explanation:
                `Factor: (x - ${r1})(x - ${r2}) = 0.`
        };
    }

    if (difficulty === 2) {
        const c = randInt(1, 9);
        return {
            problem: `Solve: x² + ${c} = 0`,
            answer: `x = ±${Math.sqrt(c)}i`,
            explanation:
                `x² = -${c} → x = ±√${c}·i.`
        };
    }

    if (difficulty >= 3) {
        const base = choose([2,3,5]);
        const k = randInt(2,5);
        return {
            problem: `Solve: log_${base}(x) = ${k}`,
            answer: `${Math.pow(base,k)}`,
            explanation:
                `log_b(x)=k → x=b^k → x=${base}^${k}.`
        };
    }
}

/* ---------- PRECALCULUS ---------- */
function generatePrecalculus() {
    if (difficulty === 1) {
        const angle = choose([30,45,60]);
        return {
            problem: `Simplify: sin²(${angle}°) + cos²(${angle}°)`,
            answer: `1`,
            explanation: `Identity: sin²θ + cos²θ = 1.`
        };
    }

    if (difficulty === 2) {
        const base = choose([2,3,5]);
        const k = randInt(2,5);
        return {
            problem: `Solve: ${base}^x = ${Math.pow(base,k)}`,
            answer: `x = ${k}`,
            explanation: `Match exponents: ${base}^x = ${base}^${k}.`
        };
    }

    if (difficulty >= 3) {
        const a1 = randInt(-5,10);
        const d = randInt(-4,6);
        const n = randInt(5,12);
        const an = a1 + (n-1)*d;

        return {
            problem: `Arithmetic sequence: a₁=${a1}, d=${d}. Find aₙ for n=${n}.`,
            answer: `${an}`,
            explanation:
                `aₙ = a₁ + (n-1)d = ${a1} + (${n-1})(${d}) = ${an}.`
        };
    }
}

/* ---------- CALCULUS ---------- */
function generateCalculus() {
    if (difficulty === 1) {
        const a = randInt(1,5);
        const n = randInt(2,5);
        return {
            problem: `Differentiate: ${a}x^${n}`,
            answer: `${a*n}x^${n-1}`,
            explanation: `Power rule: d/dx[x^n] = nx^(n-1).`
        };
    }

    if (difficulty === 2) {
        const a = randInt(1,5);
        const b = randInt(1,5);
        return {
            problem: `Differentiate: x²(${a}x + ${b})`,
            answer: `${2*a}x² + ${2*b}x + ${a}x²`,
            explanation: `Product rule: (fg)' = f'g + fg'.`
        };
    }

    if (difficulty >= 3) {
        const a = randInt(2,5);
        const n = randInt(2,4);
        return {
            problem: `Differentiate: (${a}x + 1)^${n}`,
            answer: `${a*n}(${a}x + 1)^{${n-1}}`,
            explanation:
                `Chain rule: derivative of u^n is n·u^(n-1)·u'.<br>
                 u = ${a}x + 1 → u' = ${a}.`
        };
    }
}

/* ============================================================
   MASTER GENERATOR
============================================================ */
function generateProblem(topic) {
    if (topic === "mixed") {
        topic = choose(["algebra","geometry","algebra2","precalculus","calculus"]);
    }

    if (topic === "algebra") return generateAlgebra();
    if (topic === "geometry") return generateGeometry();
    if (topic === "algebra2") return generateAlgebra2();
    if (topic === "precalculus") return generatePrecalculus();
    if (topic === "calculus") return generateCalculus();
}

/* ============================================================
   UI WIRING
============================================================ */
const tabs = document.querySelectorAll(".tab");
const problemTextEl = document.getElementById("problemText");
const answerBlock = document.getElementById("answerBlock");
const explanationBlock = document.getElementById("explanationBlock");
const answerTextEl = document.getElementById("answerText");
const explanationTextEl = document.getElementById("explanationText");
const nextProblemBtn = document.getElementById("nextProblemBtn");
const showAnswerBtn = document.getElementById("showAnswerBtn");
const streakEl = document.getElementById("streak");

let currentProblem = null;

tabs.forEach(tab => {
    tab.addEventListener("click", () => {
        tabs.forEach(t => t.classList.remove("active"));
        tab.classList.add("active");
        currentTopic = tab.dataset.topic;
        streak = 0;
        updateDifficulty();
        streakEl.textContent = streak;
        problemTextEl.innerHTML = "Click Next Problem to begin.";
        answerBlock.style.display = "none";
        explanationBlock.style.display = "none";
        showAnswerBtn.disabled = true;
    });
});

nextProblemBtn.addEventListener("click", () => {
    currentProblem = generateProblem(currentTopic);
    problemTextEl.innerHTML = currentProblem.problem;
    answerBlock.style.display = "none";
    explanationBlock.style.display = "none";
    showAnswerBtn.disabled = false;
});

showAnswerBtn.addEventListener("click", () => {
    answerBlock.style.display = "block";
    explanationBlock.style.display = "block";
    answerTextEl.textContent = currentProblem.answer;
    explanationTextEl.innerHTML = currentProblem.explanation;

    streak++;
    streakEl.textContent = streak;
    updateDifficulty();
});
</script>

</body>
</html>
