<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Math Practice | Abhinav's STEM Tools</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        /* ============================================================
           THEME VARIABLES — LIGHT MODE (DEFAULT)
        ============================================================ */
        :root {
            --bg: #f5f7fa;
            --panel: #ffffff;
            --card: #ffffff;
            --accent: #2563eb;
            --accent-2: #7c3aed;
            --accent-soft: rgba(37, 99, 235, 0.12);
            --text: #1e293b;
            --muted: #64748b;
            --border: #cbd5e1;
            --radius: 16px;
            --shadow-soft: 0 18px 45px rgba(0, 0, 0, 0.08);
            --success: #16a34a;
            --danger: #dc2626;
        }

        /* ============================================================
           DARK MODE VARIABLES
        ============================================================ */
        body.dark {
            --bg: #020617;
            --panel: #0f172a;
            --card: #0f172a;
            --accent: #38bdf8;
            --accent-2: #6366f1;
            --accent-soft: rgba(56, 189, 248, 0.16);
            --text: #e5e7eb;
            --muted: #9ca3af;
            --border: #1f2937;
            --shadow-soft: 0 18px 45px rgba(0, 0, 0, 0.75);
            --success: #4ade80;
            --danger: #f87171;
        }

        /* ============================================================
           GLOBAL STYLES
        ============================================================ */
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ============================================================
           NAVBAR
        ============================================================ */
        .navbar {
            padding: 14px 22px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            background: var(--panel);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .navbar-left {
            display: flex;
            flex-direction: column;
        }

        .navbar-title {
            font-size: 20px;
            font-weight: 600;
        }

        .navbar-subtitle {
            font-size: 12px;
            color: var(--muted);
        }

        .btn-nav {
            padding: 8px 14px;
            border-radius: 999px;
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--muted);
            text-decoration: none;
            font-size: 13px;
            cursor: pointer;
        }

        /* Theme toggle button */
        #themeToggle {
            width: 38px;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        /* ============================================================
           PAGE LAYOUT (HYBRID: 2-column desktop, 1-column mobile)
        ============================================================ */
        .page {
            flex: 1;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .app-shell {
            width: 100%;
            max-width: 1300px;
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 24px;
        }

        @media (max-width: 900px) {
            .app-shell {
                grid-template-columns: 1fr;
            }
        }

        /* ============================================================
           LEFT PANEL (TOP BAR ON MOBILE)
        ============================================================ */
        .panel {
            background: var(--panel);
            border-radius: 20px;
            border: 1px solid var(--border);
            padding: 20px;
            box-shadow: var(--shadow-soft);
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .tab {
            padding: 8px 14px;
            border-radius: 999px;
            border: 1px solid var(--border);
            background: var(--card);
            color: var(--muted);
            font-size: 13px;
            cursor: pointer;
            transition: 0.15s;
        }

        .tab.active {
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            border-color: transparent;
            color: white;
            box-shadow: 0 12px 30px rgba(37, 99, 235, 0.35);
        }

        .stats-row {
            display: flex;
            gap: 12px;
            font-size: 13px;
            color: var(--muted);
        }

        .stat-pill {
            padding: 6px 10px;
            border-radius: 999px;
            border: 1px solid var(--border);
            background: var(--card);
        }

        .progress-bar {
            height: 8px;
            background: var(--border);
            border-radius: 999px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            transition: width 0.3s ease;
        }

        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn-primary {
            padding: 9px 16px;
            border-radius: 999px;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            color: white;
            border: none;
            cursor: pointer;
            font-size: 13px;
        }

        .btn-ghost {
            padding: 9px 16px;
            border-radius: 999px;
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--muted);
            cursor: pointer;
            font-size: 13px;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="navbar-left">
        <div class="navbar-title">✏️ Math Practice</div>
        <div class="navbar-subtitle">Hard, adaptive problems — Algebra through Calculus</div>
    </div>

    <div style="display:flex; align-items:center; gap:12px;">
        <button id="themeToggle" class="btn-nav">🌞</button>
        <a href="index.html" class="btn-nav">← Back</a>
    </div>
</div>

<!-- PAGE -->
<div class="page">
    <div class="app-shell">
        <!-- RIGHT: WORKSPACE -->
        <div class="workspace">
            <div class="problem-label" style="font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:0.12em;">
                Problem
            </div>

            <div class="problem-text" id="problemText" style="font-size:17px; line-height:1.55;">
                Choose a topic and click “Next Problem” to begin.
            </div>

            <!-- MULTIPLE CHOICE (optional) -->
            <div class="choices" id="choicesContainer" style="display:none; margin-top:12px; flex-wrap:wrap; gap:8px;">
                <!-- Choice buttons injected by JS -->
            </div>

            <!-- ANSWER INPUT -->
            <div class="answer-input-row" style="margin-top:14px; display:flex; flex-wrap:wrap; gap:10px; align-items:center;">
                <input 
                    id="answerInput" 
                    class="answer-input" 
                    placeholder="Type your answer here (or click a choice)"
                    style="
                        flex:1;
                        min-width:160px;
                        padding:10px 12px;
                        border-radius:12px;
                        border:1px solid var(--border);
                        background:var(--card);
                        color:var(--text);
                        font-size:14px;
                    "
                >
                <button class="btn-ghost" id="checkAnswerBtn" disabled>Check Answer</button>
            </div>

            <!-- FEEDBACK -->
            <div class="feedback" id="feedback" style="margin-top:6px; font-size:14px; min-height:20px;"></div>

            <!-- ANSWER BLOCK -->
            <div class="answer-block" id="answerBlock" style="
                display:none;
                margin-top:16px;
                padding:16px;
                background:var(--card);
                border-radius:14px;
                border:1px solid var(--border);
                font-size:14px;
                line-height:1.5;
            ">
                <strong style="font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:0.12em;">
                    Correct Answer
                </strong>
                <div id="answerText" style="margin-top:6px;"></div>
            </div>

            <!-- EXPLANATION BLOCK -->
            <div class="explanation-block" id="explanationBlock" style="
                display:none;
                margin-top:16px;
                padding:16px;
                background:var(--card);
                border-radius:14px;
                border:1px solid var(--border);
                font-size:14px;
                line-height:1.55;
            ">
                <strong style="font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:0.12em;">
                    Explanation
                </strong>
                <div id="explanationText" style="margin-top:6px;"></div>
            </div>
        </div>

    </div> <!-- end of .app-shell -->
</div> <!-- end of .page -->
<script>
/* ============================================================
   THEME TOGGLE (matches your other pages)
============================================================ */
const themeToggle = document.getElementById("themeToggle");

// Load saved theme
if (localStorage.getItem("theme") === "dark") {
    document.body.classList.add("dark");
    themeToggle.textContent = "🌙";
}

// Toggle theme
themeToggle.addEventListener("click", () => {
    document.body.classList.toggle("dark");

    if (document.body.classList.contains("dark")) {
        themeToggle.textContent = "🌙";
        localStorage.setItem("theme", "dark");
    } else {
        themeToggle.textContent = "🌞";
        localStorage.setItem("theme", "light");
    }
});

/* ============================================================
   STATE + ADAPTIVE DIFFICULTY
============================================================ */
let currentTopic = "algebra";
let streak = 0;
let difficulty = 2; // 1 easy, 2 medium, 3 hard, 4 very hard
let currentProblem = null;

const streakEl = document.getElementById("streak");
const difficultyLabelEl = document.getElementById("difficultyLabel");
const progressFillEl = document.getElementById("progressFill");
const problemTextEl = document.getElementById("problemText");
const answerInputEl = document.getElementById("answerInput");
const feedbackEl = document.getElementById("feedback");
const answerBlockEl = document.getElementById("answerBlock");
const explanationBlockEl = document.getElementById("explanationBlock");
const answerTextEl = document.getElementById("answerText");
const explanationTextEl = document.getElementById("explanationText");
const choicesContainerEl = document.getElementById("choicesContainer");
const nextProblemBtn = document.getElementById("nextProblemBtn");
const showSolutionBtn = document.getElementById("showSolutionBtn");
const checkAnswerBtn = document.getElementById("checkAnswerBtn");

function updateDifficulty() {
    if (streak >= 10) difficulty = 4;
    else if (streak >= 6) difficulty = 3;
    else if (streak >= 3) difficulty = 2;
    else difficulty = 1;

    const labels = {1: "Warm-up", 2: "Medium", 3: "Hard", 4: "Very hard"};
    difficultyLabelEl.textContent = labels[difficulty];
    progressFillEl.style.width = (difficulty * 25) + "%";
}

/* ============================================================
   UTILITIES
============================================================ */
function randInt(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
}
function choose(arr) {
    return arr[Math.floor(Math.random() * arr.length)];
}
function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
}

/* Smart answer normalization */
function normalizeAnswer(str) {
    return String(str)
        .trim()
        .toLowerCase()
        .replace(/\s+/g, "")
        .replace(/≈/g, "")
        .replace(/·/g, "*");
}

/* Numeric closeness check */
function numericClose(user, correct, tol = 1e-3) {
    const u = parseFloat(user);
    const c = parseFloat(correct);
    if (isNaN(u) || isNaN(c)) return false;
    return Math.abs(u - c) <= tol;
}

/* ============================================================
   PROBLEM GENERATORS (HARD)
============================================================ */

/* ---------- ALGEBRA ---------- */
function generateAlgebra() {
    if (difficulty === 1) {
        const x = randInt(-5, 8);
        const a = randInt(2, 5);
        const b = randInt(3, 9);
        const c = randInt(-10, 10);
        const rhs = a * (x + b) - c;

        return {
            problem: `Solve for x: ${a}(x + ${b}) - ${c} = ${rhs}`,
            answer: `${x}`,
            explanation:
                `1. Distribute: ${a}(x + ${b}) = ${a}x + ${a*b}.<br>
                 2. Equation becomes ${a}x + ${a*b} - ${c} = ${rhs}.<br>
                 3. Combine constants: ${a}x + ${a*b - c} = ${rhs}.<br>
                 4. Subtract ${a*b - c}: ${a}x = ${rhs - (a*b - c)}.<br>
                 5. Divide by ${a}: x = ${x}.`,
            choices: null
        };
    }

    if (difficulty === 2) {
        const x = randInt(-4, 6);
        const y = randInt(-4, 6);
        const a1 = randInt(1, 5), b1 = randInt(1, 5);
        const a2 = randInt(1, 5), b2 = randInt(1, 5);
        const c1 = a1*x + b1*y;
        const c2 = a2*x + b2*y;

        return {
            problem: `Solve the system:<br>
                      ${a1}x + ${b1}y = ${c1}<br>
                      ${a2}x + ${b2}y = ${c2}`,
            answer: `(${x},${y})`,
            explanation:
                `Use elimination:<br>
                 1. Multiply equations to align coefficients.<br>
                 2. Subtract to eliminate a variable.<br>
                 3. Solve for the remaining variable.<br>
                 4. Substitute back to find the other.<br>
                 5. Check: (${x}, ${y}) satisfies both equations.`,
            choices: null
        };
    }

    // difficulty >= 3: rational equation
    const x = randInt(1, 6);
    const a = randInt(2, 5);
    const b = randInt(2, 5);
    const lhs = (a*x + b) / x;

    const correct = `${x}`;
    const distractors = shuffle([
        `${x+1}`,
        `${x-1}`,
        `${a}`,
        `${b}`
    ]).slice(0, 3);

    return {
        problem: `Solve the rational equation: ( ${a}x + ${b} ) / x = ${lhs}`,
        answer: correct,
        explanation:
            `1. Multiply both sides by x to clear the denominator: ${a}x + ${b} = ${lhs}x.<br>
             2. Rearrange: ${a}x - ${lhs}x = -${b}.<br>
             3. Factor x: x(${a - lhs}) = -${b}.<br>
             4. Solve for x: x = ${x}.`,
        choices: shuffle([correct, ...distractors])
    };
}

/* ---------- GEOMETRY ---------- */
function generateGeometry() {
    if (difficulty === 1) {
        const a = randInt(30, 70);
        return {
            problem: `Two parallel lines are cut by a transversal. One interior angle is ${a}°. Find the alternate interior angle.`,
            answer: `${a}`,
            explanation:
                `Alternate interior angles are congruent when lines are parallel.`,
            choices: shuffle([`${a}`, `${a+10}`, `${a-10}`, `${180-a}`])
        };
    }

    if (difficulty === 2) {
        const arc = randInt(60, 140);
        return {
            problem: `In a circle, an inscribed angle intercepts an arc of ${arc}°. Find the measure of the inscribed angle.`,
            answer: `${arc/2}`,
            explanation:
                `Inscribed angle = ½ × intercepted arc = ${arc/2}°.`,
            choices: null
        };
    }

    // difficulty >= 3: coordinate geometry
    const x1 = randInt(-5,5);
    const y1 = randInt(-5,5);
    const x2 = randInt(-5,5);
    const y2 = randInt(-5,5);
    const dist = Math.sqrt((x2-x1)**2 + (y2-y1)**2).toFixed(2);

    return {
        problem: `Find the distance between (${x1},${y1}) and (${x2},${y2}).`,
        answer: `${dist}`,
        explanation:
            `Distance formula: √[(x₂-x₁)² + (y₂-y₁)²].`,
        choices: null
    };
}

/* ---------- ALGEBRA 2 ---------- */
function generateAlgebra2() {
    if (difficulty === 1) {
        const r1 = randInt(-5, 5);
        const r2 = randInt(-5, 5);
        const b = -(r1 + r2);
        const c = r1 * r2;

        return {
            problem: `Solve: x² ${b>=0?"+ "+b:"- "+Math.abs(b)}x ${c>=0?"+ "+c:"- "+Math.abs(c)} = 0`,
            answer: `${r1},${r2}`,
            explanation:
                `Factor: (x - ${r1})(x - ${r2}) = 0 → x = ${r1} or x = ${r2}.`,
            choices: null
        };
    }

    if (difficulty === 2) {
        const c = randInt(1, 9);
        return {
            problem: `Solve over ℂ: x² + ${c} = 0`,
            answer: `±${Math.sqrt(c)}i`,
            explanation:
                `x² = -${c} → x = ±√(-${c}) = ±√${c}·i.`,
            choices: null
        };
    }

    const base = choose([2,3,5,10]);
    const k = randInt(2,5);
    const correct = `${Math.pow(base,k)}`;
    const distractors = shuffle([
        `${Math.pow(base,k-1)}`,
        `${Math.pow(base,k+1)}`,
        `${k}`
    ]).slice(0,3);

    return {
        problem: `Solve for x: log_${base}(x) = ${k}`,
        answer: correct,
        explanation:
            `By definition, log_b(x) = k ⇔ b^k = x.<br>
             Here, x = ${base}^${k} = ${correct}.`,
        choices: shuffle([correct, ...distractors])
    };
}

/* ---------- PRECALCULUS ---------- */
function generatePrecalculus() {
    if (difficulty === 1) {
        const angle = choose([30,45,60]);
        return {
            problem: `Simplify: sin²(${angle}°) + cos²(${angle}°)`,
            answer: `1`,
            explanation: `Pythagorean identity: sin²θ + cos²θ = 1.`,
            choices: shuffle(["0","1","2","cos(2θ)"])
        };
    }

    if (difficulty === 2) {
        const base = choose([2,3,5]);
        const k = randInt(2,5);
        return {
            problem: `Solve: ${base}^x = ${Math.pow(base,k)}`,
            answer: `${k}`,
            explanation:
                `Match exponents: ${base}^x = ${base}^${k} ⇒ x = ${k}.`,
            choices: shuffle([`${k}`, `${k-1}`, `${k+1}`, `${k+2}`])
        };
    }

    const a1 = randInt(-5,10);
    const d = randInt(-4,6);
    const n = randInt(5,12);
    const an = a1 + (n-1)*d;

    return {
        problem: `In an arithmetic sequence, a₁ = ${a1} and d = ${d}. Find aₙ for n = ${n}.`,
        answer: `${an}`,
        explanation:
            `Formula: aₙ = a₁ + (n-1)d = ${a1} + (${n-1})(${d}) = ${an}.`,
        choices: null
    };
}

/* ---------- CALCULUS ---------- */
function generateCalculus() {
    if (difficulty === 1) {
        const a = randInt(1,5);
        const n = randInt(2,5);
        return {
            problem: `Find d/dx [ ${a}x^${n} ]`,
            answer: `${a*n}x^${n-1}`,
            explanation: `Power rule: d/dx[x^n] = nx^(n-1).`,
            choices: null
        };
    }

    if (difficulty === 2) {
        const a = randInt(1,5);
        const b = randInt(1,5);
        return {
            problem: `Let f(x) = x²(${a}x + ${b}). Compute f'(x).`,
            answer: `${2*a}x² + ${2*b}x + ${a}x²`,
            explanation:
                `Product rule: (fg)' = f'g + fg'.<br>
                 f = x², g = ${a}x + ${b}.`,
            choices: null
        };
    }

    const a = randInt(2,5);
    const n = randInt(2,4);
    return {
        problem: `Find d/dx [ (${a}x + 1)^${n} ]`,
        answer: `${a*n}(${a}x + 1)^{${n-1}}`,
        explanation:
            `Chain rule: derivative of u^n is n·u^(n-1)·u'.<br>
             u = ${a}x + 1 → u' = ${a}.`,
        choices: null
    };
}

/* ============================================================
   MASTER GENERATOR
============================================================ */
function generateProblem(topic) {
    if (topic === "mixed") {
        topic = choose(["algebra","geometry","algebra2","precalculus","calculus"]);
    }

    if (topic === "algebra") return generateAlgebra();
    if (topic === "geometry") return generateGeometry();
    if (topic === "algebra2") return generateAlgebra2();
    if (topic === "precalculus") return generatePrecalculus();
    if (topic === "calculus") return generateCalculus();
}

/* ============================================================
   UI WIRING
============================================================ */
const tabs = document.querySelectorAll(".tab");

tabs.forEach(tab => {
    tab.addEventListener("click", () => {
        tabs.forEach(t => t.classList.remove("active"));
        tab.classList.add("active");
        currentTopic = tab.dataset.topic;
        streak = 0;
        updateDifficulty();
        streakEl.textContent = streak;
        problemTextEl.innerHTML = "Click Next Problem to begin.";
        answerBlockEl.style.display = "none";
        explanationBlockEl.style.display = "none";
        feedbackEl.textContent = "";
        feedbackEl.className = "feedback";
        answerInputEl.value = "";
        choicesContainerEl.style.display = "none";
        showSolutionBtn.disabled = true;
        checkAnswerBtn.disabled = true;
    });
});

nextProblemBtn.addEventListener("click", () => {
    currentProblem = generateProblem(currentTopic);
    problemTextEl.innerHTML = currentProblem.problem;
    answerBlockEl.style.display = "none";
    explanationBlockEl.style.display = "none";
    feedbackEl.textContent = "";
    feedbackEl.className = "feedback";
    answerInputEl.value = "";
    showSolutionBtn.disabled = false;
    checkAnswerBtn.disabled = false;

    // multiple choice
    choicesContainerEl.innerHTML = "";
    if (currentProblem.choices && currentProblem.choices.length) {
        choicesContainerEl.style.display = "flex";
        currentProblem.choices.forEach(choice => {
            const btn = document.createElement("button");
            btn.className = "choice-btn";
            btn.textContent = choice;
            btn.addEventListener("click", () => {
                answerInputEl.value = choice;
            });
            choicesContainerEl.appendChild(btn);
        });
    } else {
        choicesContainerEl.style.display = "none";
    }
});

checkAnswerBtn.addEventListener("click", () => {
    if (!currentProblem) return;
    const userRaw = answerInputEl.value;
    if (!userRaw.trim()) return;

    const userNorm = normalizeAnswer(userRaw);
    const correctNorm = normalizeAnswer(currentProblem.answer);

    let correct = false;

    if (numericClose(userRaw, currentProblem.answer)) {
        correct = true;
    } else if (userNorm === correctNorm) {
        correct = true;
    }

    if (correct) {
        feedbackEl.textContent = "Correct!";
        feedbackEl.className = "feedback correct";
        streak++;
        streakEl.textContent = streak;
        updateDifficulty();
    } else {
        feedbackEl.textContent = "Not quite — try again or show the full solution.";
        feedbackEl.className = "feedback incorrect";
        streak = Math.max(0, streak - 1);
        streakEl.textContent = streak;
        updateDifficulty();
    }
});

showSolutionBtn.addEventListener("click", () => {
    if (!currentProblem) return;
    answerBlockEl.style.display = "block";
    explanationBlockEl.style.display = "block";
    answerTextEl.textContent = currentProblem.answer;
    explanationTextEl.innerHTML = currentProblem.explanation;
});
</script>

</body>
</html>
