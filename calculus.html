<!DOCTYPE html>
<html>
<head>
    <title>Calculus Visualizer</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background: #f5f5f5;
        }
        h1 {
            color: #333;
        }
        canvas {
            background: white;
            border: 1px solid #ccc;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .section {
            background: white;
            padding: 20px;
            margin-top: 20px;
            border-radius: 8px;
        }
        button {
            padding: 6px 12px;
            margin-right: 10px;
        }
        label {
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>Interactive Calculus Visualizer</h1>

    <!-- Top graph: f(x) -->
    <canvas id="graph" width="600" height="400"></canvas>

    <!-- Bottom graph: f'(x) -->
    <canvas id="derivativeGraph" width="600" height="200"></canvas>

    <div class="section">
        <label>Function: f(x) = </label>
        <input id="funcInput" value="x*x" />
        <br><br>

        <label>Point (x): </label>
        <input id="xInput" type="number" value="1" step="0.1" />

        <br><br>

        <label>Move point:</label><br>
        <input id="xSlider" type="range" min="-5" max="5" step="0.01" value="1" style="width: 300px;">

        <br><br>

        <button id="playPauseBtn">Pause</button>

        <label>Speed:</label>
        <input id="speedSlider" type="range" min="0.1" max="3" step="0.1" value="1" style="width: 150px;">
        <span id="speedLabel">1.0x</span>
    </div>

    <p id="slopeDisplay" style="font-size: 18px; font-weight: bold; margin-top: 10px;"></p>

    <script>
        const graph = document.getElementById("graph");
        const dGraph = document.getElementById("derivativeGraph");
        const ctx = graph.getContext("2d");
        const dctx = dGraph.getContext("2d");

        const xInput = document.getElementById("xInput");
        const xSlider = document.getElementById("xSlider");
        const funcInput = document.getElementById("funcInput");
        const slopeDisplay = document.getElementById("slopeDisplay");
        const playPauseBtn = document.getElementById("playPauseBtn");
        const speedSlider = document.getElementById("speedSlider");
        const speedLabel = document.getElementById("speedLabel");

        let isAnimating = true;
        let t = 0;

        xInput.addEventListener("input", () => xSlider.value = xInput.value);
        xSlider.addEventListener("input", () => xInput.value = xSlider.value);

        speedSlider.addEventListener("input", () => {
            speedLabel.textContent = speedSlider.value + "x";
        });

        playPauseBtn.addEventListener("click", () => {
            isAnimating = !isAnimating;
            playPauseBtn.textContent = isAnimating ? "Pause" : "Play";
        });

        function f(x) {
            return eval(funcInput.value);
        }

        function derivative(x) {
            let h = 0.001;
            return (f(x + h) - f(x)) / h;
        }

        function drawFunction(ctx, width, height, yScale) {
            ctx.strokeStyle = "blue";
            ctx.beginPath();
            for (let px = 0; px < width; px++) {
                let x = (px - width / 2) / 40;
                let y = f(x);
                let py = height / 2 - y * yScale;
                if (px === 0) ctx.moveTo(px, py);
                else ctx.lineTo(px, py);
            }
            ctx.stroke();
        }

        function drawDerivativeGraph() {
            dctx.clearRect(0, 0, dGraph.width, dGraph.height);

            dctx.strokeStyle = "#aaa";
            dctx.beginPath();
            dctx.moveTo(dGraph.width / 2, 0);
            dctx.lineTo(dGraph.width / 2, dGraph.height);
            dctx.moveTo(0, dGraph.height / 2);
            dctx.lineTo(dGraph.width, dGraph.height / 2);
            dctx.stroke();

            dctx.strokeStyle = "purple";
            dctx.beginPath();
            for (let px = 0; px < dGraph.width; px++) {
                let x = (px - dGraph.width / 2) / 40;
                let y = derivative(x);
                let py = dGraph.height / 2 - y * 40;
                if (px === 0) dctx.moveTo(px, py);
                else dctx.lineTo(px, py);
            }
            dctx.stroke();

            let x0 = parseFloat(xInput.value);
            let slope = derivative(x0);
            let px0 = dGraph.width / 2 + x0 * 40;
            let py0 = dGraph.height / 2 - slope * 40;

            dctx.fillStyle = "black";
            dctx.beginPath();
            dctx.arc(px0, py0, 4, 0, Math.PI * 2);
            dctx.fill();
        }

        function draw() {
            ctx.clearRect(0, 0, graph.width, graph.height);

            ctx.strokeStyle = "#aaa";
            ctx.beginPath();
            ctx.moveTo(graph.width / 2, 0);
            ctx.lineTo(graph.width / 2, graph.height);
            ctx.moveTo(0, graph.height / 2);
            ctx.lineTo(graph.width, graph.height / 2);
            ctx.stroke();

            drawFunction(ctx, graph.width, graph.height, 40);

            if (isAnimating) {
                let speed = parseFloat(speedSlider.value);
                t += 0.01 * speed;
                let animatedX = Math.sin(t) * 4;
                xSlider.value = animatedX.toFixed(2);
                xInput.value = animatedX.toFixed(2);
            }

            let x0 = parseFloat(xInput.value);
            let y0 = f(x0);
            let slope = derivative(x0);

            ctx.strokeStyle = "red";
            ctx.beginPath();
            for (let px = 0; px < graph.width; px++) {
                let x = (px - graph.width / 2) / 40;
                let y = y0 + slope * (x - x0);
                let py = graph.height / 2 - y * 40;
                if (px === 0) ctx.moveTo(px, py);
                else ctx.lineTo(px, py);
            }
            ctx.stroke();

            ctx.fillStyle = "black";
            let px0 = graph.width / 2 + x0 * 40;
            let py0 = graph.height / 2 - y0 * 40;
            ctx.beginPath();
            ctx.arc(px0, py0, 5, 0, Math.PI * 2);
            ctx.fill();

            slopeDisplay.innerText =
                "Slope at x = " + x0.toFixed(2) + " is " + slope.toFixed(4);

            drawDerivativeGraph();

            requestAnimationFrame(draw);
        }

        draw();
    </script>
</body>
</html>
