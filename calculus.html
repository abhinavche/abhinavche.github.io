<!DOCTYPE html>
<html>
<head>
    <title>Calculus Visualizer</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background: #f5f5f5;
        }
        h1 {
            color: #333;
        }
        #graph {
            background: white;
            border: 1px solid #ccc;
            border-radius: 8px;
        }
        .section {
            background: white;
            padding: 20px;
            margin-top: 20px;
            border-radius: 8px;
        }
        button {
            padding: 6px 12px;
            margin-right: 10px;
        }
        label {
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>Interactive Calculus Visualizer</h1>

    <canvas id="graph" width="600" height="400"></canvas>

    <div class="section">
        <label>Function: f(x) = </label>
        <input id="funcInput" value="x*x" />
        <br><br>

        <label>Point (x): </label>
        <input id="xInput" type="number" value="1" step="0.1" />

        <br><br>

        <!-- Slider for x -->
        <label>Move point:</label><br>
        <input id="xSlider" type="range" min="-5" max="5" step="0.01" value="1" style="width: 300px;">

        <br><br>

        <!-- Animation controls -->
        <button id="playPauseBtn">Pause</button>

        <label>Speed:</label>
        <input id="speedSlider" type="range" min="0.1" max="3" step="0.1" value="1" style="width: 150px;">
        <span id="speedLabel">1.0x</span>
    </div>

    <p id="slopeDisplay" style="font-size: 18px; font-weight: bold; margin-top: 10px;"></p>

    <script>
        const canvas = document.getElementById("graph");
        const ctx = canvas.getContext("2d");

        const xInput = document.getElementById("xInput");
        const xSlider = document.getElementById("xSlider");
        const funcInput = document.getElementById("funcInput");
        const slopeDisplay = document.getElementById("slopeDisplay");
        const playPauseBtn = document.getElementById("playPauseBtn");
        const speedSlider = document.getElementById("speedSlider");
        const speedLabel = document.getElementById("speedLabel");

        let isAnimating = true;
        let t = 0; // time variable for animation

        // Keep slider and number box in sync
        xInput.addEventListener("input", () => {
            xSlider.value = xInput.value;
        });

        xSlider.addEventListener("input", () => {
            xInput.value = xSlider.value;
        });

        // Update speed label
        speedSlider.addEventListener("input", () => {
            speedLabel.textContent = speedSlider.value + "x";
        });

        // Play / Pause button
        playPauseBtn.addEventListener("click", () => {
            isAnimating = !isAnimating;
            playPauseBtn.textContent = isAnimating ? "Pause" : "Play";
        });

        function f(x) {
            return eval(funcInput.value);
        }

        function derivative(x) {
            let h = 0.001;
            return (f(x + h) - f(x)) / h;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw axes
            ctx.strokeStyle = "#aaa";
            ctx.beginPath();
            ctx.moveTo(300, 0);
            ctx.lineTo(300, 400);
            ctx.moveTo(0, 200);
            ctx.lineTo(600, 200);
            ctx.stroke();

            // Draw function
            ctx.strokeStyle = "blue";
            ctx.beginPath();
            for (let px = 0; px < 600; px++) {
                let x = (px - 300) / 40;
                let y = f(x);
                let py = 200 - y * 40;
                if (px === 0) ctx.moveTo(px, py);
                else ctx.lineTo(px, py);
            }
            ctx.stroke();

            // Auto-animate x if playing
            if (isAnimating) {
                let speed = parseFloat(speedSlider.value);
                t += 0.01 * speed;
                let animatedX = Math.sin(t) * 4; // oscillate between -4 and 4
                xSlider.value = animatedX.toFixed(2);
                xInput.value = animatedX.toFixed(2);
            }

            // Draw tangent line and point
            let x0 = parseFloat(xInput.value);
            let y0 = f(x0);
            let slope = derivative(x0);

            ctx.strokeStyle = "red";
            ctx.beginPath();
            for (let px = 0; px < 600; px++) {
                let x = (px - 300) / 40;
                let y = y0 + slope * (x - x0);
                let py = 200 - y * 40;
                if (px === 0) ctx.moveTo(px, py);
                else ctx.lineTo(px, py);
            }
            ctx.stroke();

            ctx.fillStyle = "black";
            let px0 = 300 + x0 * 40;
            let py0 = 200 - y0 * 40;
            ctx.beginPath();
            ctx.arc(px0, py0, 5, 0, Math.PI * 2);
            ctx.fill();

            slopeDisplay.innerText =
                "Slope at x = " + x0.toFixed(2) + " is " + slope.toFixed(4);

            requestAnimationFrame(draw);
        }

        draw();
    </script>
</body>
</html>
